name: "Setup Gradle"
description: "Installs java and restores gradle and build cache"

runs:
  using: "composite"
  steps:
    - name: "Setup Jdk 21"
      uses: actions/setup-java@v4
      with:
        cache: 'gradle'
        cache-dependency-path: |
          *.properties
          *.gradle.kts
          buildSrc/**/*.gradle.kts
        java-version: 21
        check-latest: true
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: true
    - name: BuildSrc cache
      uses: actions/cache@v4
      with:
        path: buildSrc/build
        key: ${{ runner.os }}-buildSrc-${{ hashFiles('buildSrc/*.kts') }}

